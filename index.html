<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Keys - Barebones Level Test</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="wrap">
    <div class="hud">
      <div class="level">Level 1</div>
      <div class="attempts"><span id="attemptsLeft">20</span> attempts left</div>
    </div>

    <div id="word" class="word" aria-label="Target word"></div>

    <div id="scene" class="scene isHidden" aria-label="Scene animation area">
      <div class="platform"></div>
      <div class="player" aria-hidden="true"></div>
      <div class="flag" aria-hidden="true"></div>
    </div>

    <!-- keyboard -->
    <div id="keyboard" class="keyboard" aria-label="Keyboard">
      <div class="row">
        <div class="key" data-key="Q">Q</div>
        <div class="key" data-key="W">W</div>
        <div class="key" data-key="E">E</div>
        <div class="key" data-key="R">R</div>
        <div class="key" data-key="T">T</div>
        <div class="key" data-key="Y">Y</div>
        <div class="key" data-key="U">U</div>
        <div class="key" data-key="I">I</div>
        <div class="key" data-key="O">O</div>
        <div class="key" data-key="P">P</div>
      </div>

      <div class="row row--indent">
        <div class="key" data-key="A">A</div>
        <div class="key" data-key="S">S</div>
        <div class="key" data-key="D">D</div>
        <div class="key" data-key="F">F</div>
        <div class="key" data-key="G">G</div>
        <div class="key" data-key="H">H</div>
        <div class="key" data-key="J">J</div>
        <div class="key" data-key="K">K</div>
        <div class="key" data-key="L">L</div>
      </div>

      <div class="row">
        <div class="key key--wide" data-key="Shift">⇧</div>
        <div class="key" data-key="Z">Z</div>
        <div class="key" data-key="X">X</div>
        <div class="key" data-key="C">C</div>
        <div class="key" data-key="V">V</div>
        <div class="key" data-key="B">B</div>
        <div class="key" data-key="N">N</div>
        <div class="key" data-key="M">M</div>
        <div class="key key--wide" data-key="Backspace">⌫</div>
      </div>

      <div class="row row--bottom">
        <div class="key key--wide" data-key="Mode">123</div>
        <div class="key key--space" data-key=" ">space</div>
        <div class="key key--wide" data-key="Enter">return</div>
      </div>
    </div>

    <div id="status" class="status" aria-live="polite"></div>
    <div class="hint">Type the letters in order to continue.</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
